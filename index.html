<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedCraft — Your AI LinkedIn Growth Manager</title>
  <meta name="description" content="Train LinkedCraft on your writing style. Generate authentic posts, plan a 30-day calendar, analyze your branding, and grow your LinkedIn audience.">
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✍️</text></svg>">
  
  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone to compile JSX on the fly in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Google Fonts: Inter and Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Markdown Renderer for Profile Audits and Chat bubbles -->
  <script src="https://unpkg.com/marked@4.3.0/marked.min.js"></script>

  <style>
    /* ----------------------------------------------------
       THEMING SYSTEM (VANILLA CSS VARIABLES)
       ---------------------------------------------------- */
    :root {
      --font-heading: 'Plus Jakarta Sans', sans-serif;
      --font-body: 'Inter', sans-serif;
      
      /* Light Mode Palette */
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;
      --border-color: #e2e8f0;
      
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      
      --accent-primary: #0077b5; /* LinkedIn Blue */
      --accent-hover: #005f92;
      --accent-light: #eef3f8;
      --accent-success: #10b981;
      --accent-danger: #ef4444;
      --accent-warning: #f59e0b;
      
      --card-bg: #ffffff;
      --sidebar-bg: #0f172a;
      --sidebar-text: #94a3b8;
      --sidebar-active-text: #ffffff;
      --sidebar-active-bg: #1e293b;
      
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 2px 4px -2px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -4px rgba(0, 0, 0, 0.08);
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 18px;
    }

    body.dark-theme {
      /* Dark Mode Palette */
      --bg-primary: #090d16;
      --bg-secondary: #0f172a;
      --bg-tertiary: #1e293b;
      --border-color: #1e293b;
      
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      
      --accent-primary: #38bdf8; /* Vibrant light blue */
      --accent-hover: #7dd3fc;
      --accent-light: #0c4a6e;
      
      --card-bg: #0f172a;
      --sidebar-bg: #070a13;
      --sidebar-text: #64748b;
      --sidebar-active-text: #f8fafc;
      --sidebar-active-bg: #0f172a;
      
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
    }

    /* ----------------------------------------------------
       GLOBAL RESETS
       ---------------------------------------------------- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: background-color 0.25s ease, border-color 0.25s ease;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    h1, h2, h3, h4, h5 {
      font-family: var(--font-heading);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    p {
      color: var(--text-secondary);
    }

    a {
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 500;
    }
    a:hover {
      text-decoration: underline;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* ----------------------------------------------------
       LAYOUT HOUSING
       ---------------------------------------------------- */
    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    .main-workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .workspace-content {
      padding: 32px 40px;
      flex: 1;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    @media (max-width: 900px) {
      .app-layout {
        flex-direction: column;
      }
      .workspace-content {
        padding: 24px 16px;
      }
    }

    /* ----------------------------------------------------
       SIDEBAR NAVIGATION
       ---------------------------------------------------- */
    .sidebar {
      width: 260px;
      background-color: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      padding: 28px 20px;
      flex-shrink: 0;
      border-right: 1px solid var(--border-color);
    }

    @media (max-width: 900px) {
      .sidebar {
        width: 100%;
        padding: 16px;
        border-right: none;
        border-bottom: 1px solid var(--border-color);
      }
    }

    .sidebar-brand {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 1.4rem;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 36px;
    }

    .sidebar-brand span {
      background-color: var(--accent-primary);
      color: #ffffff;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .sidebar-menu {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    @media (max-width: 900px) {
      .sidebar-menu {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 8px;
      }
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--sidebar-text);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .sidebar-link:hover {
      color: var(--sidebar-active-text);
      background-color: var(--sidebar-active-bg);
    }

    .sidebar-link.active {
      color: var(--sidebar-active-text);
      background-color: var(--sidebar-active-bg);
      box-shadow: var(--shadow-sm);
    }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    @media (max-width: 900px) {
      .sidebar-footer {
        margin-top: 12px;
        flex-direction: row;
        border-top: none;
        align-items: center;
      }
    }

    /* ----------------------------------------------------
       COMPONENTS: CARDS, BUTTONS & FORMS
       ---------------------------------------------------- */
    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 28px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 24px;
      position: relative;
    }
    
    .card-title {
      font-size: 1.15rem;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-heading);
      font-weight: 600;
      font-size: 0.9rem;
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      gap: 8px;
    }

    .btn-primary {
      background-color: var(--accent-primary);
      color: #ffffff;
    }
    .btn-primary:hover:not(:disabled) {
      background-color: var(--accent-hover);
      transform: translateY(-1px);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background-color: var(--bg-tertiary);
      color: var(--text-primary);
      border-color: var(--border-color);
    }
    .btn-secondary:hover:not(:disabled) {
      background-color: var(--border-color);
    }

    .btn-outline {
      background-color: transparent;
      color: var(--accent-primary);
      border-color: var(--accent-primary);
    }
    .btn-outline:hover {
      background-color: var(--accent-light);
    }

    .btn-danger {
      background-color: var(--accent-danger);
      color: #ffffff;
    }
    .btn-danger:hover {
      opacity: 0.9;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-control {
      width: 100%;
      font-family: inherit;
      font-size: 0.95rem;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      outline: none;
    }
    .form-control:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px var(--accent-light);
    }

    /* ----------------------------------------------------
       THEME ACCENTS & NOTIFICATIONS
       ---------------------------------------------------- */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      font-size: 0.75rem;
      font-weight: 700;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .badge-pro {
      background-color: #fef3c7;
      color: #b45309;
      border: 1px solid #fde68a;
    }
    body.dark-theme .badge-pro {
      background-color: #78350f;
      color: #fde68a;
    }
    .badge-free {
      background-color: #f1f5f9;
      color: #475569;
    }

    .badge-success { background-color: #d1fae5; color: #065f46; }
    .badge-warning { background-color: #fef3c7; color: #92400e; }
    .badge-info { background-color: #e0f2fe; color: #075985; }

    /* Alert cards */
    .alert {
      padding: 16px;
      border-radius: var(--radius-md);
      margin-bottom: 24px;
      border: 1px solid transparent;
      display: flex;
      gap: 12px;
      font-size: 0.9rem;
    }
    .alert-warning {
      background-color: #fffbeb;
      color: #92400e;
      border-color: #fde68a;
    }
    body.dark-theme .alert-warning {
      background-color: #1e1b4b;
      color: #f3e8ff;
      border-color: #312e81;
    }
    .alert-error {
      background-color: #fef2f2;
      color: #991b1b;
      border-color: #fca5a5;
    }

    /* ----------------------------------------------------
       TOAST SYSTEM
       ---------------------------------------------------- */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10000;
    }

    .toast {
      background-color: var(--text-primary);
      color: var(--bg-primary);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideIn 0.25s ease-out;
    }

    @keyframes slideIn {
      from { transform: translateY(100%) scale(0.9); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    /* ----------------------------------------------------
       PAGE VIEW ARCHITECTURE
       ---------------------------------------------------- */
    .view-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 16px;
    }

    .view-title {
      font-size: 1.8rem;
    }

    /* Landing Page Styling */
    .landing-hero {
      text-align: center;
      padding: 80px 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .landing-hero h1 {
      font-size: 3.25rem;
      line-height: 1.15;
      margin-bottom: 20px;
      background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent-primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .landing-hero p {
      font-size: 1.25rem;
      margin-bottom: 36px;
      color: var(--text-secondary);
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin: 48px 0;
    }

    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 32px;
      margin: 64px 0;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .pricing-card {
      border: 2px solid var(--border-color);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .pricing-card.premium {
      border-color: var(--accent-primary);
    }
    .pricing-price {
      font-size: 2.5rem;
      font-weight: 800;
      margin: 20px 0;
    }

    /* Chat agent style */
    .chat-layout {
      display: flex;
      height: calc(100vh - 180px);
      gap: 20px;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .chat-threads {
      width: 250px;
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      background-color: var(--bg-primary);
    }

    .thread-list {
      flex: 1;
      overflow-y: auto;
    }

    .thread-item {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .thread-item:hover, .thread-item.active {
      background-color: var(--bg-secondary);
      color: var(--accent-primary);
    }

    .chat-window {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-messages {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message-bubble {
      max-width: 75%;
      padding: 14px 18px;
      border-radius: var(--radius-md);
      font-size: 0.92rem;
      line-height: 1.5;
    }
    .message-bubble.user {
      align-self: flex-end;
      background-color: var(--accent-primary);
      color: #ffffff;
      border-bottom-right-radius: 2px;
    }
    .message-bubble.assistant {
      align-self: flex-start;
      background-color: var(--bg-tertiary);
      color: var(--text-primary);
      border-bottom-left-radius: 2px;
    }
    .message-bubble p {
      color: inherit;
      margin-bottom: 8px;
    }
    .message-bubble p:last-child {
      margin-bottom: 0;
    }

    .chat-input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 12px;
    }

    /* Post generation preview boxes in Chat bubble */
    .draft-preview-box {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-top: 12px;
      font-size: 0.85rem;
    }

    /* Content calendar list style */
    .calendar-timeline {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 24px;
    }

    .calendar-item {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      padding: 20px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      background-color: var(--card-bg);
    }
    .calendar-date-badge {
      text-align: center;
      min-width: 80px;
      padding: 10px;
      background-color: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      font-weight: 700;
    }
    .calendar-date-day {
      font-size: 1.25rem;
      display: block;
      line-height: 1;
    }
    .calendar-date-month {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    /* Analytics styles */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-box {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 24px;
      text-align: center;
    }

    .stat-number {
      font-size: 2.25rem;
      font-weight: 800;
      color: var(--accent-primary);
      margin: 8px 0;
    }

    /* Modal Overlay & Modal Window */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5000;
      padding: 16px;
    }
    .modal-container {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      max-width: 600px;
      width: 100%;
      padding: 32px;
      box-shadow: var(--shadow-lg);
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-muted);
    }

    /* Skeletons */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--border-color) 50%, var(--bg-tertiary) 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- React JSX compiled dynamically -->
  <script type="text/babel">

    const API_BASE = '';

    // Standard API requester
    async function apiRequest(endpoint, method = 'GET', body = null) {
      const token = localStorage.getItem('linkedcraft_token');
      const headers = { 'Content-Type': 'application/json' };
      if (token) {
        headers['Authorization'] = `Bearer ${token}`;
      }
      const options = { method, headers };
      if (body) {
        options.body = JSON.stringify(body);
      }
      
      const response = await fetch(`${API_BASE}${endpoint}`, options);
      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.error || `Request failed with status ${response.status}`);
      }
      return response.json();
    }

    const FOUNDER_SAMPLES = [
      "Funding is not a badge of honor. It is a debt you owe to your employees, customers, and investors. Focus on building real revenue from day one. In India, capital efficiency is not a choice, it is a superpower. Scale will naturally follow when the unit economics work. #StartupIndia #Founders",
      "We hired our first 10 core engineers by sending raw, direct DMs on Twitter and LinkedIn. No fancy recruiter pitches, no bloated job specs. Just a simple, honest note about what we are building and why it matters. Look for missionaries, not mercenaries. Missionaries ship products; mercenaries watch the clock. #BuildingInPublic #Hiring",
      "Indian SaaS is built differently. We don't have the luxury of burning $50M on customer acquisition. We are forced to build global-grade software with tight, hungry product teams. It makes us resilient. The next decade of tech infrastructure is going to be written out of Bangalore and Pune. #IndianSaaS #Product"
    ];

    // Helper functions
    const formatTimeAgo = (ts) => {
      const diffMs = Date.now() - ts;
      const secs = Math.floor(diffMs / 1000);
      const mins = Math.floor(secs / 60);
      const hrs = Math.floor(mins / 60);
      const days = Math.floor(hrs / 24);

      if (secs < 60) return 'Just now';
      if (mins < 60) return `${mins}m ago`;
      if (hrs < 24) return `${hrs}h ago`;
      return `${days}d ago`;
    };

    function App() {
      // Navigation Router state
      const [path, setPath] = React.useState(() => window.location.hash.replace('#', '') || '/');
      
      // Global User & Configurations
      const [currentUser, setCurrentUser] = React.useState('');
      const [userData, setUserData] = React.useState(null);
      const [isInitializing, setIsInitializing] = React.useState(true);
      const [theme, setTheme] = React.useState(() => localStorage.getItem('theme') || 'light');
      
      // Toast notifications state
      const [toasts, setToasts] = React.useState([]);

      // Forms
      const [authEmail, setAuthEmail] = React.useState('');
      const [authPassword, setAuthPassword] = React.useState('');
      const [authMode, setAuthMode] = React.useState('signup');
      const [authError, setAuthError] = React.useState('');
      
      // Onboarding Voice samples
      const [onboardSample1, setOnboardSample1] = React.useState('');
      const [onboardSample2, setOnboardSample2] = React.useState('');
      const [onboardSample3, setOnboardSample3] = React.useState('');
      const [onboardError, setOnboardError] = React.useState('');

      // Settings state
      const [apiKey, setApiKey] = React.useState('');

                      <div className="form-group">
                        <label className="form-label">Target Audience Persona</label>
                        <input type="text" className="form-control" placeholder="E.g., Early-stage Startup Founders, HR Directors" value={targetAudience} onChange={e => setTargetAudience(e.target.value)} />
                      </div>
                      <div className="form-group">
                        <label className="form-label">Writing Style / Accent Guidelines</label>
                        <input type="text" className="form-control" placeholder="E.g., Short punchy sentences, direct storytelling, no fluff" value={writingStyle} onChange={e => setWritingStyle(e.target.value)} />
                      </div>
                      <div className="form-group">
                        <label className="form-label">Overall Personal Branding Goals</label>
                        <textarea className="form-control" style={{ minHeight: '80px' }} placeholder="E.g., Establish thought leadership, generate product signups, attract engineers..." value={contentGoals} onChange={e => setContentGoals(e.target.value)} />
                      </div>
                      <button type="submit" className="btn btn-primary">Save Memory Parameters</button>
                    </form>
                  </div>
                </div>
              )}

              {/* PAGE 9: LINKEDIN HUB */}
              {path === '/linkedin' && (
                <div>
                  <div className="view-header">
                    <div>
                      <h1 className="view-title">LinkedIn Connection Hub</h1>
                      <p>Link your account, request branding audits, and create comment networking replies.</p>
                    </div>
                  </div>

                  {userData && userData.linkedinProfile && userData.linkedinProfile.connected ? (
                    <div>
                      {/* Connection profile card */}
                      <div className="card" style={{ display: 'flex', gap: '20px', alignItems: 'center' }}>
                        <img src={userData.linkedinProfile.avatar} alt="LinkedIn Avatar" style={{ width: '80px', height: '80px', borderRadius: '50%', border: '2px solid var(--accent-primary)' }} />
                        <div style={{ flex: 1 }}>
                          <h2>{userData.linkedinProfile.name}</h2>
                          <p style={{ color: 'var(--text-secondary)', fontSize: '0.9rem' }}>{userData.linkedinProfile.headline}</p>
                          <div style={{ display: 'flex', gap: '8px', marginTop: '10px' }}>
                            <span className="badge badge-success">✓ Authorized Live Connection</span>
                            <span style={{ fontSize: '0.8rem', color: 'var(--text-muted)' }}>URN: {userData.linkedinProfile.urn}</span>
                          </div>
                        </div>
                        <button className="btn btn-danger" onClick={handleDisconnectLinkedin}>Disconnect Account</button>
                      </div>

                      {/* Profile Branding Audit */}
                      <div className="card">
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                          <h3 className="card-title" style={{ marginBottom: 0 }}>AI Profile Branding Audit</h3>
                          <button className="btn btn-primary" onClick={handleAnalyzeProfile} disabled={isAuditingProfile}>
                            {isAuditingProfile ? 'Auditing profile...' : 'Audit Profile Brand'}
                          </button>
                        </div>
                        
                        {profileAudit ? (
                          <div style={{ whiteSpace: 'pre-wrap', backgroundColor: 'var(--bg-primary)', padding: '20px', borderRadius: '8px', border: '1px solid var(--border-color)', fontSize: '0.9rem' }} dangerouslySetInnerHTML={{ __html: marked.parse(profileAudit) }} />
                        ) : (
                          <p style={{ fontSize: '0.9rem', fontStyle: 'italic' }}>Click "Audit Profile Brand" to fetch details and run branding analysis utilizing Gemini.</p>
                        )}
                      </div>

                      {/* Comment Networking suggestion */}
                      <div className="card">
                        <h3 className="card-title">Comment Networking Engine</h3>
                        <p style={{ fontSize: '0.85rem', marginBottom: '16px' }}>Paste a target LinkedIn post you want to reply to. The AI will suggest 3 authentic comment templates representing your branding preferences.</p>
                        <div className="form-group">
                          <textarea className="form-control" style={{ minHeight: '80px' }} placeholder="Paste the post text content here..." value={commentTargetPost} onChange={e => setCommentTargetPost(e.target.value)} />
                        </div>
                        <button className="btn btn-primary" onClick={handleSuggestComments} disabled={isGeneratingComments || !commentTargetPost.trim()}>
                          {isGeneratingComments ? 'Analyzing post...' : 'Generate 3 Suggested Comments'}
                        </button>

                        {suggestedComments.length > 0 && (
                          <div style={{ display: 'flex', flexDirection: 'column', gap: '14px', marginTop: '20px' }}>
                            {suggestedComments.map((c, idx) => (
                              <div key={idx} style={{ backgroundColor: 'var(--bg-primary)', padding: '14px', borderRadius: '6px', border: '1px solid var(--border-color)', fontSize: '0.85rem' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '6px', fontWeight: 'bold', color: 'var(--accent-primary)' }}>
                                  <span>Comment Suggestion {idx + 1}</span>
                                  <button style={{ background: 'none', border: 'none', cursor: 'pointer', textDecoration: 'underline', fontSize: '0.75rem', color: 'var(--text-secondary)' }} onClick={() => {
                                    navigator.clipboard.writeText(c);
                                    addToast("Comment copied!");
                                  }}>Copy Template</button>
                                </div>
                                <div>{c}</div>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  ) : (
                    <div className="card" style={{ textAlign: 'center', padding: '48px' }}>
                      <span style={{ fontSize: '3rem' }}>🔗</span>
                      <h3>Connect Your LinkedIn Account</h3>
                      <p style={{ maxWidth: '480px', margin: '8px auto 20px auto' }}>Link your account securely to authorize drafts publishing and unlock profile analysis recommendations.</p>
                      <button className="btn btn-primary" onClick={() => setShowLinkedinModal(true)}>Connect LinkedIn Profile</button>
                    </div>
                  )}
                </div>
              )}

              {/* LINKEDIN MOCK CONNECTION MODAL */}
              {showLinkedinModal && (
                <div className="modal-overlay">
                  <div className="modal-container" style={{ maxWidth: '450px' }}>
                    <button className="modal-close" onClick={() => setShowLinkedinModal(false)}>&times;</button>
                    <h3>LinkedIn OAuth Simulation</h3>
                    <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)', margin: '8px 0 20px 0' }}>Simulating connection workflow for developer sandboxing.</p>
                    
                    <form onSubmit={handleConnectLinkedin}>
                      <div className="form-group">
                        <label className="form-label">Full Name</label>
                        <input type="text" className="form-control" value={mockLiName} onChange={e => setMockLiName(e.target.value)} required />
                      </div>
                      <div className="form-group">
                        <label className="form-label">LinkedIn Headline</label>
                        <input type="text" className="form-control" value={mockLiHeadline} onChange={e => setMockLiHeadline(e.target.value)} required />
                      </div>
                      <button type="submit" className="btn btn-primary" style={{ width: '100%' }}>Connect Mock Profile</button>
                    </form>
                  </div>
                </div>
              )}

              {/* PAGE 10: SETTINGS PAGE */}
              {path === '/settings' && (
                <div>
                  <div className="view-header">
                    <div>
                      <h1 className="view-title">Configuration Settings</h1>
                      <p>Configure model selection, API key mappings, and plan tiers.</p>
                    </div>
                  </div>

                  <div className="card">
                    <form onSubmit={handleSaveSettings}>
                      <div className="form-group">
                        <label className="form-label">Select API Provider Model</label>
                        <select className="form-control" value={apiProvider} onChange={e => {
                          const val = e.target.value;
                          setApiProvider(val);
                          if (val === 'demo') setModel('gemini-2.5-flash');
                          else if (val === 'groq') setModel('llama-3.3-70b-versatile');
                          else if (val === 'ollama') setModel('llama3');
                        }}>
                          <option value="demo">Default Google Gemini (Server env default)</option>
                          <option value="groq">Groq Llama 3</option>
                          <option value="ollama">Ollama Local Llama</option>
                        </select>
                      </div>

                      {apiProvider !== 'demo' && (
                        <React.Fragment>
                          <div className="form-group">
                            <label className="form-label">Custom API Key (Optional)</label>
                            <input type="password" className="form-control" placeholder="Leave empty to use server default keys" value={apiKey} onChange={e => setApiKey(e.target.value)} />
                          </div>
                          <div className="form-group">
                            <label className="form-label">Model Name</label>
                            <input type="text" className="form-control" value={model} onChange={e => setModel(e.target.value)} />
                          </div>
                        </React.Fragment>
                      )}

                      <button type="submit" className="btn btn-primary">Save Model Settings</button>
                    </form>
                  </div>

                  <div className="card">
                    <h3>Billing & Subscriptions</h3>
                    <p style={{ margin: '8px 0 20px 0' }}>Configure limits and manage upgrades.</p>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '16px', backgroundColor: 'var(--bg-primary)', border: '1px solid var(--border-color)', borderRadius: '8px' }}>
                      <div>
                        <strong>Current Plan: <span style={{ textTransform: 'capitalize' }}>{userData?.plan || 'free'}</span></strong>
                        <p style={{ fontSize: '0.8rem', marginTop: '4px' }}>
                          {userData?.plan === 'pro' ? 'Enjoy unlimited generations and full dashboard features.' : 'Limited to 5 generations total.'}
                        </p>
                      </div>
                      {userData?.plan !== 'pro' && (
                        <button className="btn btn-primary" onClick={handleUpgrade}>Upgrade to Pro</button>
                      )}
                    </div>
                  </div>
                </div>
              )}

            </div>
          </div>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);

  </script>
</body>
</html>
